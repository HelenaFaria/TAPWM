<script>
    let nome = prompt("Escreva um nome: ");
    let n1 = parseFloat(prompt("Escreva a primeira nota: "));
    let n2 = parseFloat(prompt("Escreva a segunda nota: "));
    let n3 = parseFloat(prompt("Escreva a terceira nota: "));

    let soma = (n1 + n2 + n3) / 3;

    alert("Nome: " + nome + "\nMédia notas: " + soma.toFixed(2));

    

</script>
