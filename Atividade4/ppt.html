<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pedra, Papel e Tesoura</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            text-align: center;
            color: white;
            padding-top: 100px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 30px;
        }

        button {
            background-color: white;
            color: #333;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #333;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>Pedra, Papel e Tesoura</h1>
    <button onclick="jogar()">Jogar</button>
</body>
<script src="js.js"></script>
</html>
